<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Message Scene Renderer</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background: transparent;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        .message-export {
            position: relative;
            overflow: hidden;
            background: #f3e5d8;
            color: #24181d;
        }

        .message-export__bg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .message-export__gradient {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(53, 18, 35, 0.96) 0%, rgba(109, 23, 50, 0.94) 52%, rgba(246, 143, 58, 0.9) 100%);
        }

        .message-export__layer {
            position: absolute;
            box-sizing: border-box;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .message-export__layer--title {
            letter-spacing: -0.04em;
        }

        .message-export__layer--body {
            background: transparent;
        }

        .message-export__button {
            position: absolute;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            border-radius: 999px;
            background: linear-gradient(180deg, #d98a5f 0%, #bd6f4c 55%, #9f5739 100%);
            color: #fff6ed;
            text-align: center;
            box-shadow: 0 18px 28px rgba(86, 45, 27, 0.18), inset 0 1px 0 rgba(255, 255, 255, 0.25);
            font-weight: 800;
            white-space: nowrap;
        }

        .message-export__button span {
            display: inline-block;
            transform: translateY(1px);
        }
    </style>
</head>
<body>
    <div id="messageSceneExport"></div>
    <script src="../assets/js/message-scene-renderer.js"></script>
    <script>
        (function () {
            'use strict';

            const escapeHtml = function (value) {
                return String(value == null ? '' : value)
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#039;');
            };

            const applyShadow = function (element, shadow) {
                if (shadow === 'strong') {
                    element.style.textShadow = '0 6px 22px rgba(0, 0, 0, 0.30)';
                    return;
                }

                if (shadow === 'soft') {
                    element.style.textShadow = '0 2px 10px rgba(0, 0, 0, 0.16)';
                    return;
                }

                element.style.textShadow = 'none';
            };

            const createTextLayer = function (layer) {
                const node = document.createElement('div');
                const role = layer.role === 'title' ? 'title' : 'body';
                node.className = 'message-export__layer message-export__layer--' + role;
                node.style.left = (layer.x || 0) + 'px';
                node.style.top = (layer.y || 0) + 'px';
                node.style.width = Math.max(20, layer.width || 20) + 'px';
                node.style.color = layer.color || (role === 'title' ? '#fff7f0' : '#2c1917');
                node.style.fontSize = Math.max(12, layer.fontSize || 18) + 'px';
                node.style.lineHeight = String(layer.lineHeight || 1.2);
                node.style.fontWeight = String(layer.fontWeight || (role === 'title' ? 700 : 400));
                node.style.fontStyle = layer.fontStyle === 'italic' ? 'italic' : 'normal';
                node.style.textAlign = layer.textAlign || 'left';
                node.style.textTransform = layer.uppercase ? 'uppercase' : 'none';
                applyShadow(node, layer.shadow || 'none');
                node.innerHTML = escapeHtml(layer.text || '').replace(/\n/g, '<br>');
                return node;
            };

            const createButtonLayer = function (layer) {
                const node = document.createElement('div');
                const height = Math.max(54, layer.height || 54);
                const width = Math.max(80, layer.width || 80);
                const label = document.createElement('span');
                label.textContent = layer.text || 'Abrir mensagem';
                node.className = 'message-export__button';
                node.style.left = (layer.x || 0) + 'px';
                node.style.top = (layer.y || 0) + 'px';
                node.style.width = width + 'px';
                node.style.height = height + 'px';
                node.style.fontSize = Math.max(16, Math.round(height * 0.42)) + 'px';
                node.appendChild(label);
                return node;
            };

            window.__MESSAGE_RENDER_READY__ = false;

            window.renderMessageSceneFromPayload = async function (payload) {
                const data = payload && typeof payload === 'object' ? payload : {};
                const scene = window.MessageSceneRenderer.resolveScene(
                    data.scene && typeof data.scene === 'object' ? data.scene : data,
                    data.tokenValues && typeof data.tokenValues === 'object' ? data.tokenValues : null
                );

                const root = document.getElementById('messageSceneExport');
                root.innerHTML = '';
                root.className = 'message-export';
                root.style.width = scene.canvas.width + 'px';
                root.style.height = scene.canvas.height + 'px';

                if (scene.canvas.backgroundImage) {
                    const image = document.createElement('img');
                    image.className = 'message-export__bg';
                    image.alt = '';
                    image.src = scene.canvas.backgroundImage;
                    root.appendChild(image);
                } else {
                    const gradient = document.createElement('div');
                    gradient.className = 'message-export__gradient';
                    root.appendChild(gradient);
                }

                scene.layers.forEach(function (layer) {
                    if (layer.visible === false) {
                        return;
                    }

                    if (layer.type === 'button') {
                        root.appendChild(createButtonLayer(layer));
                        return;
                    }

                    if (layer.type === 'hotspot') {
                        return;
                    }

                    root.appendChild(createTextLayer(layer));
                });

                if (document.fonts && typeof document.fonts.ready === 'object') {
                    try {
                        await document.fonts.ready;
                    } catch (error) {
                        // segue mesmo sem esperar as fontes
                    }
                }

                await new Promise(function (resolve) {
                    requestAnimationFrame(function () {
                        requestAnimationFrame(resolve);
                    });
                });

                window.__MESSAGE_RENDER_READY__ = true;
                return {
                    width: scene.canvas.width,
                    height: scene.canvas.height
                };
            };
        })();
    </script>
</body>
</html>
